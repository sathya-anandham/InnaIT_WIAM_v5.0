spring:
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

innait:
  gateway:
    jwt:
      jwks-url: http://localhost:19999/.well-known/jwks.json
      issuer: https://auth.innait.io
    rate-limit:
      login-per-minute: 10
      api-per-minute: 100
    public-paths:
      - /api/v1/auth/login/**
      - /api/v1/tokens/refresh
      - /.well-known/**
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**

management:
  endpoint:
    health:
      show-details: always
