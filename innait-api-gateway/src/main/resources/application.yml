spring:
  application:
    name: innait-api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude:
      - io.innait.wiam.common.config.CommonAutoConfiguration
  cloud:
    gateway:
      default-filters:
        - name: CircuitBreaker
          args:
            name: defaultCircuitBreaker
            fallbackUri: forward:/fallback
        - name: Retry
          args:
            retries: 1
            statuses: INTERNAL_SERVER_ERROR, BAD_GATEWAY, SERVICE_UNAVAILABLE, GATEWAY_TIMEOUT
            methods: GET
      routes:
        - id: auth-orchestrator
          uri: ${AUTH_ORCHESTRATOR_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/auth/**
          metadata:
            rate-limit: 10
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/identity/**
        - id: credential-service
          uri: ${CREDENTIAL_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/credentials/**
        - id: session-service
          uri: ${SESSION_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/sessions/**
        - id: token-service
          uri: ${TOKEN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/tokens/**
        - id: policy-service
          uri: ${POLICY_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/policies/**
        - id: audit-service
          uri: ${AUDIT_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/audit/**
        - id: admin-config-service
          uri: ${ADMIN_CONFIG_SERVICE_URL:http://localhost:8090}
          predicates:
            - Path=/api/v1/admin/**
        - id: admin-bff
          uri: ${ADMIN_BFF_URL:http://localhost:8092}
          predicates:
            - Path=/api/v1/self/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/notifications/**
        - id: directory-connector
          uri: ${DIRECTORY_CONNECTOR_URL:http://localhost:8091}
          predicates:
            - Path=/api/v1/directories/**
        - id: well-known
          uri: ${TOKEN_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/.well-known/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Resilience4j circuit breaker defaults
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 3s
  timelimiter:
    configs:
      default:
        timeout-duration: 10s

# Gateway custom config
innait:
  gateway:
    jwt:
      jwks-url: ${JWKS_URL:http://localhost:8086/.well-known/jwks.json}
      issuer: ${JWT_ISSUER:https://auth.innait.io}
    rate-limit:
      login-per-minute: 10
      api-per-minute: 100
    public-paths:
      - /api/v1/auth/login/**
      - /api/v1/tokens/refresh
      - /.well-known/**
      - /actuator/health
      - /swagger-ui/**
      - /v3/api-docs/**
      - /api/v1/admin/tenants/resolve/**
