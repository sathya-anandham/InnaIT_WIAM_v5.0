worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript
                  text/xml application/xml application/xml+rss text/javascript;

    # ── Login Portal  (port 4200) ──────────────────────────────────────────
    server {
        listen 4200;
        server_name _;
        root /usr/share/nginx/html/login-portal;
        index index.html;

        # Never cache index.html so browsers always get fresh chunk references
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        # Hashed assets can be cached long-term
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy all API calls to the gateway
        location /api/ {
            proxy_pass         http://innait-api-gateway:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /.well-known/ {
            proxy_pass       http://innait-api-gateway:8080;
            proxy_set_header Host $host;
        }
    }

    # ── Self-Service Portal  (port 4300) ──────────────────────────────────
    server {
        listen 4300;
        server_name _;
        root /usr/share/nginx/html/self-service-portal;
        index index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://innait-api-gateway:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }

    # ── Admin Console  (port 4400) ─────────────────────────────────────────
    server {
        listen 4400;
        server_name _;
        root /usr/share/nginx/html/admin-console;
        index index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|ico)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass         http://innait-api-gateway:8080;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
