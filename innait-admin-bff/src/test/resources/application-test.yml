spring:
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

innait:
  security:
    jwks-url: http://localhost:19999/.well-known/jwks.json
    cors:
      allowed-origins: http://localhost:4200

wiam:
  services:
    identity-url: http://localhost:18081
    credential-url: http://localhost:18082
    auth-url: http://localhost:18083
    session-url: http://localhost:18085
    policy-url: http://localhost:18087
    audit-url: http://localhost:18088
    notification-url: http://localhost:18089
    config-url: http://localhost:18090
    token-url: http://localhost:18086
  file:
    import-max-rows: 100
  recovery:
    otp-length: 6
    otp-ttl-seconds: 300
    reset-token-ttl-seconds: 900
    max-forgot-attempts: 3
    forgot-rate-window-seconds: 900
  kafka:
    enabled: false
