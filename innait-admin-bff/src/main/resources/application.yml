spring:
  application:
    name: innait-admin-bff
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8092

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

innait:
  security:
    jwks-url: ${JWKS_URL:http://localhost:8086/.well-known/jwks.json}
    cors:
      allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

wiam:
  services:
    identity-url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
    credential-url: ${CREDENTIAL_SERVICE_URL:http://localhost:8082}
    auth-url: ${AUTH_ORCHESTRATOR_URL:http://localhost:8083}
    session-url: ${SESSION_SERVICE_URL:http://localhost:8085}
    policy-url: ${POLICY_SERVICE_URL:http://localhost:8087}
    audit-url: ${AUDIT_SERVICE_URL:http://localhost:8088}
    notification-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8089}
    config-url: ${ADMIN_CONFIG_SERVICE_URL:http://localhost:8090}
    token-url: ${TOKEN_SERVICE_URL:http://localhost:8086}
  file:
    import-max-rows: 5000
  recovery:
    otp-length: 6
    otp-ttl-seconds: 300
    reset-token-ttl-seconds: 900
    max-forgot-attempts: 3
    forgot-rate-window-seconds: 900
